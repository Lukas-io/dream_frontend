services:
  postgres:
    image: postgres:16-alpine
    container_name: lineage-postgres
    environment:
      POSTGRES_DB: lineage
      POSTGRES_USER: lineage
      POSTGRES_PASSWORD: lineage
    ports:
      - "5432:5432"
    volumes:
      - lineage-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lineage -d lineage"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lineage-postgres-data:
