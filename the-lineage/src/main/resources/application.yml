spring:
  application:
    name: the-lineage
  profiles:
    default: local

server:
  port: 8080

lineage:
  jwt:
    secret: ${LINEAGE_JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    access-ttl-minutes: ${LINEAGE_JWT_ACCESS_TTL_MIN:15}
    refresh-ttl-days: ${LINEAGE_JWT_REFRESH_TTL_DAYS:7}
  cart:
    reservation-ttl-minutes: 15
  escrow:
    auto-release-days: 7

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${LINEAGE_DB_URL:jdbc:postgresql://localhost:5432/lineage}
    username: ${LINEAGE_DB_USER:lineage}
    password: ${LINEAGE_DB_PASSWORD:lineage}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
